name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  # Tier-2 backstop: even with faster path-filtered PR gates, run the broad
  # test lane on a timer and on demand so skipped PR paths cannot hide drift.
  schedule:
    - cron: '17 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Show test environment diagnostics
        run: |
          uv --version
          uv cache dir
          uv python list --only-installed

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"

      - name: Run tests
        run: |
          mkdir -p .test-reports
          source .venv/bin/activate
          python -m pytest tests/ -q --ignore=tests/integration --ignore=tests/e2e --tb=short -n auto --splits 4 --group ${{ matrix.shard }} --durations=50 -o faulthandler_timeout=180 --junitxml=.test-reports/pytest-unit-shard-${{ matrix.shard }}.xml
        env:
          # Ensure tests don't accidentally call real APIs
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: pytest-unit-shard-${{ matrix.shard }}-diagnostics
          path: .test-reports/pytest-unit-shard-${{ matrix.shard }}.xml
          if-no-files-found: warn

  test-result:
    name: test result
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check pytest shard matrix result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::At least one pytest shard failed or was cancelled: ${{ needs.test.result }}"
            exit 1
          fi
          echo "All pytest shards passed."

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Show e2e environment diagnostics
        run: |
          uv --version
          uv cache dir
          uv python list --only-installed

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"

      - name: Run e2e tests
        run: |
          mkdir -p .test-reports
          source .venv/bin/activate
          python -m pytest tests/e2e/ -v --tb=short --junitxml=.test-reports/pytest-e2e.xml
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

      - name: Upload e2e pytest diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: pytest-e2e-diagnostics
          path: .test-reports/pytest-e2e.xml
          if-no-files-found: warn
