version: 1
policy:
  secrets_writable_ssot: bitwarden-secrets-manager
  projections_are_not_truth:
    - ~/.hermes/.env
  forbidden_without_separate_approval:
    - hermes gateway restart
    - provider mutation
    - bitwarden secret write
    - projection regeneration
secrets:
  - name: DATABASE_URL
    owner: hermes-runtime
    writable_ssot:
      type: bitwarden-secrets-manager
      project: hermes
      secret_name: DATABASE_URL
    projections:
      - type: env_file
        path: ~/.hermes/.env
        key: DATABASE_URL
    verification: [projection_key_present, bws_metadata_present]
  - name: DISCORD_BOT_TOKEN
    owner: hermes-gateway-discord
    writable_ssot:
      type: bitwarden-secrets-manager
      project: hermes
      secret_name: DISCORD_BOT_TOKEN
    projections:
      - type: env_file
        path: ~/.hermes/.env
        key: DISCORD_BOT_TOKEN
    verification: [projection_key_present, bws_metadata_present]
  - name: FISH_AUDIO_API_KEY
    owner: hermes-media-tools
    writable_ssot:
      type: bitwarden-secrets-manager
      project: hermes
      secret_name: FISH_AUDIO_API_KEY
    projections:
      - type: env_file
        path: ~/.hermes/.env
        key: FISH_AUDIO_API_KEY
    verification: [projection_key_present, bws_metadata_present]
  - name: HERMES_GATEWAY_TOKEN
    owner: hermes-gateway
    writable_ssot:
      type: bitwarden-secrets-manager
      project: hermes
      secret_name: HERMES_GATEWAY_TOKEN
    projections:
      - type: env_file
        path: ~/.hermes/.env
        key: HERMES_GATEWAY_TOKEN
    verification: [projection_key_present, bws_metadata_present]
  - name: LINEAR_API_KEY
    owner: hermes-linear
    writable_ssot:
      type: bitwarden-secrets-manager
      project: hermes
      secret_name: LINEAR_API_KEY
    projections:
      - type: env_file
        path: ~/.hermes/.env
        key: LINEAR_API_KEY
    verification: [projection_key_present, bws_metadata_present]
  - name: RAILWAY_API_TOKEN
    owner: hermes-devops
    writable_ssot:
      type: bitwarden-secrets-manager
      project: hermes
      secret_name: RAILWAY_API_TOKEN
    projections:
      - type: env_file
        path: ~/.hermes/.env
        key: RAILWAY_API_TOKEN
    verification: [projection_key_present, bws_metadata_present]
  - name: SUPABASE_ACCESS_TOKEN
    owner: hermes-devops
    writable_ssot:
      type: bitwarden-secrets-manager
      project: hermes
      secret_name: SUPABASE_ACCESS_TOKEN
    projections:
      - type: env_file
        path: ~/.hermes/.env
        key: SUPABASE_ACCESS_TOKEN
    verification: [projection_key_present, bws_metadata_present]
  - name: WEBHOOK_SECRET
    owner: hermes-webhook
    writable_ssot:
      type: bitwarden-secrets-manager
      project: hermes
      secret_name: WEBHOOK_SECRET
    projections:
      - type: env_file
        path: ~/.hermes/.env
        key: WEBHOOK_SECRET
    verification: [projection_key_present, bws_metadata_present]
secret_bearing_files:
  - path: ~/.hermes/.env
    max_mode: "0600"
  - path: ~/.hermes/config.yaml
    max_mode: "0600"
  - path: ~/.hermes/honcho.json
    max_mode: "0600"
  - path: ~/.hermes/google_token.json
    max_mode: "0600"
scan_paths:
  - ~/.hermes/config.yaml
  - ~/.hermes/cron
  - ~/.hermes/scripts
notes:
  - This manifest is a first read-only governance slice, not a migration.
  - Bootstrap token handling for BWS_ACCESS_TOKEN remains outside this manifest and belongs to CH-224.
  - Add entries as secrets are moved into Bitwarden metadata; do not add raw values here.
