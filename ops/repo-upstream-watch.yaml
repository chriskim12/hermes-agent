schema_version: 1
metadata:
  owner: Chris / Hermes
  silent_marker: "[SILENT]"
  state_path: /home/ubuntu/.hermes/state/status-gate/repo-upstream-watch.json
  entrypoints:
    check: python /home/ubuntu/.hermes/hermes-agent/scripts/repo_update_gate.py check --inventory /home/ubuntu/.hermes/hermes-agent/ops/repo-upstream-watch.yaml --cron
    apply_plan: python /home/ubuntu/.hermes/hermes-agent/scripts/repo_update_gate.py apply-plan --inventory /home/ubuntu/.hermes/hermes-agent/ops/repo-upstream-watch.yaml
repos:
  - name: oh-my-codex
    path: /home/ubuntu/repos/oh-my-codex
    mode: safe_auto_apply
    base_remote: upstream
    base_branch: main
    smoke_test: npm test
    apply_window: manual-review
    bootstrap_required: true
    notes:
      - initial baseline catch-up was reviewed before broad auto-apply
      - 2026-04-20: baseline fast-forward completed to v0.14.0 and the tree is clean/tracking upstream/main
      - 2026-04-20: ARM64 hydration-fixture blocker was fixed on branch `ch-122-arm64-smoke-blocker`; `npm test` passes there on this host
      - 2026-04-20: remote alias was normalized from `origin` to `upstream` on this checkout to reduce lane-name ambiguity
      - keep bootstrap_required until that fix is landed/reconciled onto the mainline update lane
      - fast-forward-only apply remains the intended steady-state lane after bootstrap clears
  - name: clawhip
    path: /home/ubuntu/repos/clawhip
    mode: report_only
    base_remote: origin
    base_branch: main
    smoke_test: cargo test
    apply_window: manual-review
    notes:
      - direct apply stays blocked while the working tree is dirty
  - name: hermes-agent
    path: /home/ubuntu/.hermes/hermes-agent
    mode: staged_sync
    base_remote: upstream
    base_branch: main
    smoke_test: source venv/bin/activate && python -m pytest tests/ -q
    apply_window: manual-review
    staging_branch: sync/upstream-main
    staging_worktree_path: /home/ubuntu/.hermes/hermes-agent/.worktrees/sync-upstream-main
    notes:
      - never direct-apply onto active local branches
      - stage upstream integration in a dedicated worktree first
