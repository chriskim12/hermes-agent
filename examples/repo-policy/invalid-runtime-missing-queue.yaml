version: 1
repo:
  name: invalid-runtime-missing-queue
  class: runtime_tooling
authority:
  policy_source: .hermes/repo-policy.yaml
roles:
  work: task_worktree
  landing: verified_fork_main
  release: upstream_sync_or_local_release_note
  live_apply: not_applicable
workflow:
  canonical_landing: verified_landing
  work_done_means: verified_landing_candidate
  release_source: main
  release_target: main
  live_apply: manual_gate
branches:
  landing: main
  release_base: main
gates:
  green_allowed:
  - code_changes
  - tests
  - local_commit
  yellow_queue:
  - human_review_needed
  red_requires_explicit_approval:
  - push
  - upstream_pr
  - merge
  - gateway_restart_reload
  - live_runtime_apply
runtime:
  restart_policy: not_applicable
  live_apply_queue: not_applicable
closeout:
  required_sections:
  - 결론
  - 실제 반영
  - 아직 안 한 것
  - 다음 판단
  - Policy check
  - Green 완료
  - Yellow 대기
  - Red 필요
  - 검증
  - Git 상태
  - Live 상태
