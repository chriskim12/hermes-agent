version: 1
repo:
  name: invalid-product-main-landing
  class: product
authority:
  policy_source: .hermes/repo-policy.yaml
roles:
  work: task_branch
  landing: verified_fork_main
  release: release_pr_to_main
  live_apply: deploy_gate
workflow:
  canonical_landing: verified_fork_main
  work_done_means: local_commit
  release_source: main
  release_target: main
  live_apply: deploy_gate
branches:
  landing: main
  release_base: main
gates:
  green_allowed:
  - code_changes
  - tests
  yellow_queue:
  - policy_migration_needed
  red_requires_explicit_approval:
  - merge
  - deploy
  - prod_mutation
  - env_secret_change
  - billing_pricing_change
runtime:
  restart_policy: not_applicable
  live_apply_queue: not_applicable
closeout:
  required_sections:
  - 결론
  - 실제 반영
  - 아직 안 한 것
  - 다음 판단
  - Policy check
  - Green 완료
  - Yellow 대기
  - Red 필요
  - 검증
  - Git 상태
  - Live 상태
